services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: abaco
      POSTGRES_PASSWORD: abaco
      POSTGRES_DB: abaco
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
